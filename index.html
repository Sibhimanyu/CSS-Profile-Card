<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CSS Card</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="card">
      <div class="avatar">
        <img src="profile.jpg" alt="Profile photo" />
      </div>

      <div class="card__content">
        <h1>Sibhimanyu G</h1>
        <h2>Student building school software and automation tools</h2>
        <p class="note">
          I build practical apps with Firebase, JavaScript, and Python, and I
          like making small tools that help with school, workflows, and daily
          tasks.
        </p>

        <div class="contact">
          <p class="contact__item"><span>Location</span> India</p>
          <p class="contact__item"><span>Email</span> sibhi.gv@gmail.com</p>
          <p class="contact__item"><span>Phone</span> +91 88256 22360</p>
        </div>

        <div class="social-links" aria-label="Social links">
          <a class="social-link" href="https://github.com/Sibhimanyu" target="_blank" >GitHub</a>
          <a class="social-link" href="https://www.linkedin.com/in/sibhimanyu/" target="_blank" >LinkedIn</a>
        </div>
      </div>
    </main>
  </body>
</html>
